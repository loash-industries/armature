name: PR Validation

permissions:
  contents: read
  pull-requests: read
  checks: write
  packages: read

on:
  pull_request:
    branches:
      - main

# concurrency:
  # group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  # cancel-in-progress: true

jobs:
  # Detect which paths changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      move: ${{ steps.filter.outputs.move }}
      whitepaper: ${{ steps.filter.outputs.whitepaper }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            move:
              - 'packages/**'
              - '.github/workflows/**'
            whitepaper:
              - 'whitepaper/**'
              - '.github/workflows/**'

  # Move contracts: fmt, build, test
  move-contracts:
    runs-on: ubuntu-latest
    needs:
      - changes
    if: needs.changes.outputs.move == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH

      - name: Install Sui CLI
        run: /home/linuxbrew/.linuxbrew/bin/brew install sui

      - name: Setup Node.js (for prettier-move)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check Move formatting (armature_framework)
        run: |
          npm i @mysten/prettier-plugin-move
          npx prettier-move -c packages/armature_framework/**/*.move

      - name: Check Move formatting (armature_proposals)
        run: |
          npm i @mysten/prettier-plugin-move
          npx prettier-move -c packages/armature_proposals/**/*.move

      - name: Build Move packages
        run: |
          for dir in packages/*; do
            if [ -d "$dir" ] && [ -f "$dir/Move.toml" ]; then
              echo "Building $dir"
              sui move build --path "$dir"
            fi
          done

      - name: Test Move packages
        env:
          SUI_SKIP_SHARED_OBJECTS_VERSION_CHECK: 1
        run: |
          for dir in packages/*; do
            if [ -d "$dir" ] && [ -f "$dir/Move.toml" ]; then
              echo "Testing $dir"
              sui move test --path "$dir" -i 100000000 --force
            fi
          done

  # Build whitepaper PDF
  build-whitepaper:
    runs-on: ubuntu-latest
    needs:
      - changes
    if: needs.changes.outputs.whitepaper == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Build whitepaper
        run: typst compile --root . whitepaper/main.typ whitepaper/paper.pdf

      - name: Upload whitepaper artifact
        uses: actions/upload-artifact@v4
        with:
          name: whitepaper
          path: whitepaper/paper.pdf
