name: PR Validation

permissions:
  contents: read
  pull-requests: read
  checks: write

on:
  pull_request:
    branches:
      - main

# concurrency:
  # group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  # cancel-in-progress: true

jobs:
  # Detect which paths changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
      api: ${{ steps.filter.outputs.api }}
      indexer: ${{ steps.filter.outputs.indexer }}
      move: ${{ steps.filter.outputs.move }}
      whitepaper: ${{ steps.filter.outputs.whitepaper }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ui:
              - 'ui/**'
              - '.github/workflows/**'
            api:
              - 'api/**'
              - '.github/workflows/**'
            indexer:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/**'
            move:
              - 'packages/**'
              - '.github/workflows/**'
            whitepaper:
              - 'whitepaper/**'
              - '.github/workflows/**'

  # Build API Docker image
  build-api:
    runs-on: ubuntu-latest
    needs:
      - changes
    if: needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build UI Docker image
  build-ui:
    runs-on: ubuntu-latest
    needs:
      - changes
    if: needs.changes.outputs.ui == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build UI image
        uses: docker/build-push-action@v6
        with:
          context: ./ui
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Run unit tests
  unit-test:
    runs-on: ubuntu-latest
    needs:
      - changes
    if: needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: api/yarn.lock

      - name: Install dependencies
        working-directory: api
        run: yarn install --frozen-lockfile

      - name: Run tests
        working-directory: api
        run: yarn test:cov

  # Rust indexer: fmt, clippy, test, build
  rust-indexer:
    runs-on: self-hosted
    needs:
      - changes
    if: needs.changes.outputs.indexer == 'true'
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92"
          components: clippy,rustfmt

      # On self-hosted runners the target/ dir persists between runs.
      # Swatinem/rust-cache handles ~/.cargo/registry and prunes stale
      # artifacts without expensive upload/download of the full target/.
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libpq-dev \
            libclang-dev clang

      - name: cargo fmt (check)
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all-features

      - name: cargo build
        run: cargo build --release

  # Move contracts: fmt, build, test
  move-contracts:
    runs-on: ubuntu-latest
    needs:
      - changes
    if: needs.changes.outputs.move == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH

      - name: Install Sui CLI
        run: /home/linuxbrew/.linuxbrew/bin/brew install sui

      - name: Setup Node.js (for prettier-move)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check Move formatting (armature_framework)
        run: |
          npm i @mysten/prettier-plugin-move
          npx prettier-move -c packages/armature_framework/**/*.move

      - name: Check Move formatting (armature_proposals)
        run: |
          npm i @mysten/prettier-plugin-move
          npx prettier-move -c packages/armature_proposals/**/*.move

      - name: Build Move packages
        run: |
          for dir in packages/*; do
            if [ -d "$dir" ] && [ -f "$dir/Move.toml" ]; then
              echo "Building $dir"
              sui move build --path "$dir"
            fi
          done

      - name: Test Move packages
        env:
          SUI_SKIP_SHARED_OBJECTS_VERSION_CHECK: 1
        run: |
          for dir in packages/*; do
            if [ -d "$dir" ] && [ -f "$dir/Move.toml" ]; then
              echo "Testing $dir"
              sui move test --path "$dir" -i 100000000 --force
            fi
          done

  # Build whitepaper PDF
  build-whitepaper:
    runs-on: ubuntu-latest
    needs:
      - changes
    if: needs.changes.outputs.whitepaper == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Build whitepaper
        run: typst compile --root . whitepaper/main.typ whitepaper/paper.pdf

      - name: Upload whitepaper artifact
        uses: actions/upload-artifact@v4
        with:
          name: whitepaper
          path: whitepaper/paper.pdf
