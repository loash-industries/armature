name: Deploy

permissions:
  id-token: write
  contents: read
  security-events: write
  actions: read
  checks: write
  packages: write

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Detect which paths changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
      api: ${{ steps.filter.outputs.api }}
      indexer: ${{ steps.filter.outputs.indexer }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ui:
              - 'ui/**'
              - '.github/workflows/**'
            api:
              - 'api/**'
              - '.github/workflows/**'
            indexer:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Dockerfile'
              - '.github/workflows/**'

  create-tag:
    if: github.ref == 'refs/heads/main'
    uses: loash-industries/workflows/.github/workflows/create-eph-tag.yml@v0.3.5

  # Build/Test API code
  build:
    uses: loash-industries/workflows/.github/workflows/docker-build-and-validate.yml@v0.3.5
    needs:
      - changes
      - create-tag
    if: needs.changes.outputs.api == 'true'
    with:
      image_tag: ${{ needs.create-tag.outputs.tag }}
      docker_build_context: api
    secrets:
      GH_AUTH_TOKEN: ${{ secrets.GH_AUTH_TOKEN }}

  # Build UI Docker image
  build-ui:
    uses: loash-industries/workflows/.github/workflows/docker-build-and-validate.yml@v0.3.5
    needs:
      - changes
      - create-tag
    if: needs.changes.outputs.ui == 'true'
    with:
      image_tag: ${{ needs.create-tag.outputs.tag }}
      docker_build_context: ui
    secrets:
      GH_AUTH_TOKEN: ${{ secrets.GH_AUTH_TOKEN }}

  unit-test:
    uses: loash-industries/workflows/.github/workflows/js-validate-code.yml@v0.3.5
    with:
      node_version: 22
      npm_client: yarn
      npm_registry_name: npm
      prettier_enabled: false
      tests_report_path: api/junit*.xml
      tests_coverage_path: api/coverage/**/*
      test_names: "['test:cov']"
      working_directory: api
    secrets:
      GH_AUTH_TOKEN: ${{ secrets.GH_AUTH_TOKEN }}

  deploy-dev:
    uses: loash-industries/workflows/.github/workflows/deploy.yml@v0.3.5
    needs:
      - changes
      - build
      - create-tag
      - unit-test
    if: |
      always() &&
      needs.changes.outputs.api == 'true' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      needs.unit-test.result == 'success'
    with:
      environment: dev
      argocd_workload_repository: ${{ github.repository }}-workload
      workload_path: workload/dev/main
      image_tag: ${{ needs.create-tag.outputs.tag }}
      docker_build_context: api
      npm_private_registry_url: "https://npm.pkg.github.com/"
    secrets:
      deploy_key: ${{ secrets.DEPLOY_KEY }}
      GH_AUTH_TOKEN: ${{ secrets.GH_AUTH_TOKEN }}

  deploy-prd:
    uses: loash-industries/workflows/.github/workflows/deploy.yml@v0.3.5
    needs:
      - changes
      - build
      - create-tag
      - unit-test
    if: |
      always() &&
      needs.changes.outputs.api == 'true' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      needs.unit-test.result == 'success'
    with:
      environment: prd
      argocd_workload_repository: ${{ github.repository }}-workload
      workload_path: workload/prd/main
      image_tag: ${{ needs.create-tag.outputs.tag }}
      docker_build_context: api
      npm_private_registry_url: "https://npm.pkg.github.com/"
    secrets:
      deploy_key: ${{ secrets.DEPLOY_KEY }}
      GH_AUTH_TOKEN: ${{ secrets.GH_AUTH_TOKEN }}

  # Deploy UI to dev
  deploy-ui-dev:
    uses: loash-industries/workflows/.github/workflows/deploy.yml@v0.3.5
    needs:
      - changes
      - build-ui
      - create-tag
    if: |
      always() &&
      needs.changes.outputs.ui == 'true' &&
      (needs.build-ui.result == 'success' || needs.build-ui.result == 'skipped')
    with:
      environment: dev
      argocd_workload_repository: ${{ github.repository }}-workload
      workload_path: workload/dev/main
      image_tag: ${{ needs.create-tag.outputs.tag }}-ui
      docker_build_context: ui
      yaml_label: "github-workflow-managed-ui"
      npm_private_registry_url: "https://npm.pkg.github.com/"
    secrets:
      deploy_key: ${{ secrets.DEPLOY_KEY }}
      GH_AUTH_TOKEN: ${{ secrets.GH_AUTH_TOKEN }}

  # Deploy UI to prd
  deploy-ui-prd:
    uses: loash-industries/workflows/.github/workflows/deploy.yml@v0.3.5
    needs:
      - changes
      - build-ui
      - create-tag
    if: |
      always() &&
      needs.changes.outputs.ui == 'true' &&
      (needs.build-ui.result == 'success' || needs.build-ui.result == 'skipped')
    with:
      environment: prd
      argocd_workload_repository: ${{ github.repository }}-workload
      workload_path: workload/prd/main
      image_tag: ${{ needs.create-tag.outputs.tag }}-ui
      docker_build_context: ui
      yaml_label: "github-workflow-managed-ui"
      npm_private_registry_url: "https://npm.pkg.github.com/"
    secrets:
      deploy_key: ${{ secrets.DEPLOY_KEY }}
      GH_AUTH_TOKEN: ${{ secrets.GH_AUTH_TOKEN }}

  # Build & test Rust indexer
  build-indexer:
    runs-on: self-hosted
    needs:
      - changes
      - create-tag
    if: needs.changes.outputs.indexer == 'true'
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.90.0
        with:
          components: clippy,rustfmt

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libpq-dev

      - name: cargo fmt (check)
        run: cargo fmt --all -- --check

      - name: cargo test
        run: cargo test --all-features

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_AUTH_TOKEN }}

      - name: Build & push indexer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/indexer:${{ needs.create-tag.outputs.tag }}
          build-args: |
            GIT_REVISION=${{ needs.create-tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

    outputs:
      image_ref: ghcr.io/${{ github.repository }}/indexer:${{ needs.create-tag.outputs.tag }}

  # Deploy indexer to dev
  deploy-indexer-dev:
    uses: loash-industries/workflows/.github/workflows/deploy.yml@v0.3.5
    needs:
      - changes
      - build-indexer
      - create-tag
    if: |
      always() &&
      needs.changes.outputs.indexer == 'true' &&
      needs.build-indexer.result == 'success'
    with:
      environment: dev
      argocd_workload_repository: ${{ github.repository }}-workload
      workload_path: workload/dev/main
      image_tag: ${{ needs.create-tag.outputs.tag }}-indexer
      docker_build_context: .
      yaml_label: "github-workflow-managed-indexer"
      npm_private_registry_url: "https://npm.pkg.github.com/"
    secrets:
      deploy_key: ${{ secrets.DEPLOY_KEY }}
      GH_AUTH_TOKEN: ${{ secrets.GH_AUTH_TOKEN }}

  # Deploy indexer to prd
  deploy-indexer-prd:
    uses: loash-industries/workflows/.github/workflows/deploy.yml@v0.3.5
    needs:
      - changes
      - build-indexer
      - create-tag
    if: |
      always() &&
      needs.changes.outputs.indexer == 'true' &&
      needs.build-indexer.result == 'success'
    with:
      environment: prd
      argocd_workload_repository: ${{ github.repository }}-workload
      workload_path: workload/prd/main
      image_tag: ${{ needs.create-tag.outputs.tag }}-indexer
      docker_build_context: .
      yaml_label: "github-workflow-managed-indexer"
      npm_private_registry_url: "https://npm.pkg.github.com/"
    secrets:
      deploy_key: ${{ secrets.DEPLOY_KEY }}
      GH_AUTH_TOKEN: ${{ secrets.GH_AUTH_TOKEN }}